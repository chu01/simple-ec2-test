version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: testdb
  backend:
    build: ./backend
    dockerfile: backend.dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "80:80" # Nginx on the container listens on 80